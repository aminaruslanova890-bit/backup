<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Афиша — Москва</title>
    <meta name="description" content="Афиша Москвы - фильмы, спектакли, концерты, выставки и другие развлечения">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="navigation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navigation will be injected by navigation.js -->

    <main class="main">



        <section class="hero">
            <div class="hero-grid" id="eventsContainer">
                <!-- Events will be loaded here dynamically -->
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;">
                    Загрузка мероприятий...
                </div>
            </div>
        </section>

        <section class="bottom-section">
            <div class="bottom-content">
                <div class="promo-card">
                    <div class="promo-icon">💬</div>
                    <div class="promo-text">Спросить ассистента...</div>
                </div>

                <div class="bottom-banner" style="background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);">
                    <div class="banner-logo">СберСпасибо</div>
                    <div class="banner-badge">
                        <div class="badge-icon">C</div>
                    </div>
                </div>

                <div class="collection-card">
                    <h3 class="collection-title">Изумрудная коллекция только в СберСпасибо</h3>
                    <button class="collection-btn">→</button>
                </div>
            </div>
        </section>
    </main>

    <script src="navigation.js"></script>
    <script src="script.js"></script>
</body>

</html>
